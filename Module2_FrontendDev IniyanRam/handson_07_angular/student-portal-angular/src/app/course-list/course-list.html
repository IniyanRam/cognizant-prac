<input
  type="text"
  placeholder="Search Course..."
  [(ngModel)]="searchTerm">

<br><br>

<div *ngIf="loading">
  <h2>Loading...</h2>
</div>

<div *ngIf="!loading">

  <app-course-card
    *ngFor="let course of filteredCourses"
    [name]="course.name"
    [code]="course.code"
    [credits]="course.credits"
    [grade]="course.grade">
  </app-course-card>

  <h3 *ngIf="filteredCourses.length === 0">
    No courses found
  </h3>

</div>
