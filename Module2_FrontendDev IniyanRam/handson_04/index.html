<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script type="module" src="app.js"></script>
</head>

<body>

<header>
    <h1 class="head">Student Portal</h1>

    <button class="hamburger">☰ Menu</button>

    <nav>
        <ul>
            <li>Home</li>
            <li>Courses</li>
            <li>Profile</li>
            <li>Grades</li>
        </ul>
    </nav>
</header>

<main>

    <section id="hero">
        <h1>Welcome to the Student Portal</h1>

        <p>
         Access your courses, profile, grades, and academic updates in one place.
        </p>

        <button>Explore Courses</button>
    </section>

    <section id="courses">

        <h2>Find Your Course</h2>

        <input
            type="text"
            id="search-courses"
            placeholder="Search courses..."
        >

        <button id="sort-btn">
            Sort by Credits
        </button>

        <div class="course-grid"></div>

        <p id="total-credits"></p>

        <div id="selected-course"></div>

    </section>

    <section id="stats">

        <div class="stat-item">
            <h3>3</h3>
            <p>Courses Enrolled</p>
        </div>

        <div class="stat-item">
            <h3>3.8</h3>
            <p>GPA</p>
        </div>

        <div class="stat-item">
            <h3>6</h3>
            <p>Semester</p>
        </div>

    </section>
    <section id="notifications">
    <h2>Notifications</h2>
    <div id="loading" style="display:none">
        Loading...
    </div>
    <div id="error-message" style="display:none">
        <p id="error-text"></p>
        <button id="retry-btn">Retry</button>
    </div>
    <div id="notifications-grid"></div>
</section>

</main>

<footer>
    <p>&copy; 2026 Student Portal. All rights reserved.</p>
</footer>

</body>
</html>
